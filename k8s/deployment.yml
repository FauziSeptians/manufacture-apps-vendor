apiVersion: apps/v1
kind: Deployment
metadata:
  name: manufacture-apps-vendor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manufacture-apps-vendor
  template:
    metadata:
      labels:
        app: manufacture-apps-vendor
    spec:
      containers:
        - name: manufacture-apps-vendor
          image: muhammadfauzi/manufacture-apps-vendor:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: '64Mi' # Sangat hemat untuk landing page
              cpu: '50m' # Hanya gunakan 5% dari 1 core CPU
            limits:
              memory: '128Mi' # Batas maksimal agar tidak makan jatah app lain
              cpu: '100m' # Batas maksimal tenaga CPU
          imagePullPolicy: Always
          env:
            # Trik agar Node.js melakukan pembersihan RAM lebih awal
            - name: NODE_OPTIONS
              value: '--max-old-space-size=90'
---
apiVersion: v1
kind: Service
metadata:
  name: manufacture-apps-vendor-service
spec:
  type: NodePort
  selector:
    app: manufacture-apps-vendor
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30900
