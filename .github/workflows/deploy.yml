name: Deploy Next.js to Minikube

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate .env.production
        run: |
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env.production

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker image
        run: |
          docker build --build-arg ENV_FILE=.env.production -t ${{ secrets.DOCKER_USERNAME }}/manufacture-apps-vendor:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/manufacture-apps-vendor:latest

      - name: Copy K8s Manifest to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          source: "k8s/deployment.yml"
          target: "/home/${{ secrets.SERVER_USER }}/deployments/manufacture-apps-vendor"

      - name: Deploy to Minikube via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/deployments/manufacture-apps-vendor
            kubectl apply -f k8s/deployment.yml
            kubectl rollout restart deployment manufacture-apps-vendor
